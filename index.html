<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST SpaceMobile LEO Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.162.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>

    <div id="ui" class="glass-panel">
        <h1>AST SpaceMobile LEO</h1>
        
        <div id="constellation-info" class="constellation-info">
            Walker Delta: 53°: 96/96/56
        </div>

        <div class="control-group">
            <label>Altitude: <span id="val-altitude">690</span> km</label>
            <input type="range" id="input-altitude" min="300" max="2000" value="690">
        </div>

        <div class="control-group">
            <label>Inclination: <span id="val-inclination">53</span>°</label>
            <input type="range" id="input-inclination" min="0" max="180" value="53">
        </div>

        <div class="control-group">
            <label>Total Satellites (T): <span id="val-total">96</span></label>
            <input type="range" id="input-total" min="1" max="192" value="96">
        </div>

        <div class="control-group">
            <label>Orbital Planes (P): <span id="val-planes">96</span></label>
            <input type="range" id="input-planes" min="1" max="192" value="96">
        </div>

        <div class="control-group">
            <label>Phasing (F): <span id="val-phasing">56</span></label>
            <input type="range" id="input-phasing" min="0" max="100" value="56">
        </div>

        <hr>

        <!-- Ground Station Toggle -->
        <div class="control-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <label>Satellite Field of View</label>
                <label class="switch">
                    <input type="checkbox" id="fov-toggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <label>Gateway View</label>
                <label class="switch">
                    <input type="checkbox" id="gs-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div style="font-size: 0.75rem; color: #aaa; margin: -5px 0 10px 0; font-style: italic;">
                Double Click at any point to place Gateway
            </div>
            <div id="gs-status-box" style="display: none; margin-top: 15px; padding: 10px; background: rgba(0, 255, 204, 0.1); border-radius: 6px; border: 1px solid rgba(0, 255, 204, 0.2); text-align: center;">
                <div style="font-size: 0.7rem; color: #888; text-transform: uppercase;">Connected Antennas</div>
                <div id="conn-state" style="font-size: 1rem; font-weight: bold; margin: 5px 0; color: #00ff00;">CONNECTED</div>
                <div style="font-size: 0.7rem; color: #888;">Gateway Status: <span id="conn-elev" style="color: #fff; font-weight: bold;">---</span></div>
            </div>
        </div>

        <!-- Antennas Toggle (Multi-link) -->
        <div class="control-group">
            <label>Antennas: <span id="val-antennas">1</span></label>
            <input type="range" id="input-antennas" min="1" max="4" value="1">
        </div>

        <hr>

        <div class="control-group">
            <label>Time Speed</label>
            <input type="range" id="timeSpeed" min="0" max="100" value="10">
        </div>

        <button id="btn-reset">Reset View</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
